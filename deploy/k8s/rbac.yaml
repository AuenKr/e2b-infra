apiVersion: v1
kind: ServiceAccount
metadata:
  name: e2b
  namespace: e2b-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: e2b
  namespace: sandbox
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - services
    verbs:
      - create
      - delete
      - get
      - list
      - update
  - apiGroups:
      - ""
    resources:
      - pods/exec
    verbs:
      - create
      - get
  - apiGroups:
      - metrics.k8s.io
    resources:
      - pods
    verbs:
      - get
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - httproutes
    verbs:
      - create
      - delete
      - get
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: e2b
  namespace: sandbox
subjects:
  - kind: ServiceAccount
    name: e2b
    namespace: e2b-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: e2b
