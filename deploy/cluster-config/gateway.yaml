apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: sandbox-gateway
  namespace: e2b-system
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
    - name: http
      hostname: "*.auenkr.com"
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All # Can add only from a particular namespace where all pods will be deployed
