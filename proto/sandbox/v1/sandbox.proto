syntax = "proto3";

package sandbox.v1;

import "buf/validate/validate.proto";

service SandboxService {
  // At starting we create all the resources when the standbox is starting
  // ie pod, service and  HTTP Route with zero port open
  rpc StartSandbox(StartSandboxRequest) returns (StartSandboxResponse);
  // Done save as above but in reverse order
  rpc StopSandbox(StopSandboxRequest) returns (StopSandboxResponse);

  rpc GetSandbox(GetSandboxRequest) returns (GetSandboxResponse);
  rpc ListSandbox(ListSandboxRequest) returns (ListSandboxResponse);

  rpc SendCommand(SendCommandRequest) returns (SendCommandResponse);

  // TODO:
  // Instead of creating single port at a time.
  // Make a Batch of port to open and close

  // And when open or close port: get the resource, reconsile it and update on server
  rpc OpenPort(OpenPortRequest) returns (OpenPortResponse);
  rpc ClosePort(ClosePortRequest) returns (ClosePortResponse);

  rpc ListOpenPort(ListOpenPortRequest) returns (ListOpenPortResponse);
}

message StartSandboxRequest {
  // name of pod
  string id = 1 [(buf.validate.field).required = true];
  string image = 2 [(buf.validate.field).required = true];
  Specification requirement = 3 [(buf.validate.field).required = false];
  map<string, string> env = 4 [(buf.validate.field).required = false];
  string cmd = 5 [(buf.validate.field).required = false];
  string args = 6 [(buf.validate.field).required = false];
}

message StartSandboxResponse {
  SandboxInfo sandbox = 1;
}

message GetSandboxRequest {
  string id = 1 [(buf.validate.field).required = true];
}

message GetSandboxResponse {
  SandboxInfo sandbox = 1;
  Specification resource = 2;
}

message StopSandboxRequest {
  string id = 1 [(buf.validate.field).required = true];
}

message StopSandboxResponse {
  SandboxInfo sandbox = 1;
}

message ListSandboxRequest {}

message ListSandboxResponse {
  repeated SandboxInfo sandboxs = 1;
}

message SendCommandRequest {
  string id = 1 [(buf.validate.field).required = true];
  string command = 2 [(buf.validate.field).required = true];
  // bool streaming = 2;
}

message SendCommandResponse {
  // Cmd runs successfully
  string stdout = 1;
  // Cmd throws an error
  string stderr = 2;
}

message OpenPortRequest {
  string id = 1 [(buf.validate.field).required = true];
  PortInfo port = 2 [(buf.validate.field).required = true];
}

message OpenPortResponse {
  PortInfo port = 1;
}

message ClosePortRequest {
  string id = 1 [(buf.validate.field).required = true];
  PortInfo port = 2 [(buf.validate.field).required = true];
}

message ClosePortResponse {
  PortInfo port = 1;
}

message ListOpenPortRequest {
  string id = 1 [(buf.validate.field).required = true];
}

message ListOpenPortResponse {
  repeated PortInfo ports = 1;
}

// TODO: Only support HTTP, HTTPS, gRPC, WebSocket
// No direct protocol running TCP or UDP server
// K8s ingress controller limitation
// Will look into future as most of people only need HTTP, gRPC, WebSocket
enum Protocol {
  PROTOCOL_UNSPECIFIED = 0;
  PROTOCOL_TCP = 1;
  PROTOCOL_UDP = 2;
  PROTOCOL_SCTP = 3;
}

message PortInfo {
  uint32 port_number = 1 [
    (buf.validate.field).uint32 = {
      gt: 0
      lte: 65535
    },
    (buf.validate.field).required = true
  ];
  Protocol protocol = 2 [
    (buf.validate.field).enum.defined_only = true,
    (buf.validate.field).required = true
  ];
  string hostname = 3 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.hostname = true
  ];
}

message SandboxInfo {
  // Name will be unique in each namespace, it will act as id
  string id = 1;
  SandboxStatus status = 2 [(buf.validate.field).enum.defined_only = true];
}

enum SandboxStatus {
  SANDBOX_STATUS_UNSPECIFIED = 0;
  SANDBOX_STATUS_STARTING = 1;
  SANDBOX_STATUS_RUNNING = 2;
  SANDBOX_STATUS_STOPPING = 3;
  SANDBOX_STATUS_STOPPED = 4;
  SANDBOX_STATUS_ERROR = 5;
}

// Make sure to update the default limit Min and Max limit of CPU and Memory in config
message Specification {
  // In millicore
  uint32 cpu = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).uint32 = {
      gt: 0
      lte: 4000 // 4 CPU
    }
  ];
  // In MB
  uint32 memory = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).uint32 = {
      gt: 0
      lte: 8192 // 8GB
    }
  ];
  // In GB
  uint32 storage = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).uint32 = {
      gt: 1
      lte: 102400 // 100GB
    }
  ];
}
