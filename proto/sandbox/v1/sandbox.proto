syntax = "proto3";

package sandbox.v1;

import "buf/validate/validate.proto";
import "common/v1/common.proto";

service SandboxService {
  // At starting we create all the resources when the standbox is starting
  // ie pod, service and  HTTP Route with zero port open
  rpc StartSandbox(StartSandboxRequest) returns (StartSandboxResponse);
  // Done save as above but in reverse order
  rpc StopSandbox(StopSandboxRequest) returns (StopSandboxResponse);

  rpc GetSandbox(GetSandboxRequest) returns (GetSandboxResponse);
  rpc ListSandbox(ListSandboxRequest) returns (ListSandboxResponse);

  rpc SendCommand(SendCommandRequest) returns (SendCommandResponse);
}

message StartSandboxRequest {
  // name of pod
  string id = 1 [(buf.validate.field).required = true];
  string image = 2 [(buf.validate.field).required = true];
  common.v1.Specification requirement = 3 [(buf.validate.field).required = false];
  map<string, string> env = 4 [(buf.validate.field).required = false];
  string cmd = 5 [(buf.validate.field).required = false];
  string args = 6 [(buf.validate.field).required = false];
}

message StartSandboxResponse {
  common.v1.SandboxInfo sandbox = 1;
}

message GetSandboxRequest {
  string id = 1 [(buf.validate.field).required = true];
}

message GetSandboxResponse {
  common.v1.SandboxInfo sandbox = 1;
  common.v1.Specification resource = 2;
}

message StopSandboxRequest {
  string id = 1 [(buf.validate.field).required = true];
}

message StopSandboxResponse {
  common.v1.SandboxInfo sandbox = 1;
}

message ListSandboxRequest {}

message ListSandboxResponse {
  repeated common.v1.SandboxInfo sandboxs = 1;
}

message SendCommandRequest {
  string id = 1 [(buf.validate.field).required = true];
  string command = 2 [(buf.validate.field).required = true];
  // bool streaming = 2;
}

message SendCommandResponse {
  // Cmd runs successfully
  string stdout = 1;
  // Cmd throws an error
  string stderr = 2;
}
